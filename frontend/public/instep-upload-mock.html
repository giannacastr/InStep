<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InStep — Upload (mock)</title>
  <style>
    /* Palette: https://coolors.co/0a171f-edf2fd-b47eb3-44bba4-e7bb41 */
    :root { --dark: #0a171f; --light: #edf2fd; --purple: #b47eb3; --teal: #44bba4; --gold: #e7bb41; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      background: #0a171f;
      background-image:
        linear-gradient(90deg, rgba(68, 187, 164, 0.08) 0%, transparent 45%),
        linear-gradient(90deg, transparent 55%, rgba(231, 187, 65, 0.08) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 32px;
    }
    .upload-page__title {
      font-size: 2.75rem;
      font-weight: 800;
      color: var(--purple);
      margin-bottom: 8px;
    }
    .upload-page__status {
      color: var(--light);
      opacity: 0.85;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }
    .upload-page__cards {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .upload-card {
      border: 1px solid rgba(237, 242, 253, 0.35);
      border-radius: 12px;
      padding: 20px 24px 24px;
      min-width: 260px;
      max-width: 320px;
      background: rgba(10, 23, 31, 0.6);
    }
    .upload-card__label {
      color: var(--light);
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      display: block;
    }
    .upload-card__choose-btn {
      background: var(--dark);
      color: var(--light);
      border: 1px solid rgba(237, 242, 253, 0.25);
      padding: 10px 20px;
      font-size: 0.9rem;
      border-radius: 6px;
      cursor: pointer;
    }
    .upload-card__choose-btn:hover { background: var(--teal); border-color: var(--teal); }
    .upload-page__analyze {
      background: var(--purple);
      color: var(--light);
      border: none;
      padding: 12px 32px;
      font-size: 1.05rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
    }
    .upload-page__analyze:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
  <h1 class="upload-page__title">InStep</h1>
  <p class="upload-page__status">Upload your videos to begin</p>

  <div class="upload-page__cards">
    <div class="upload-card">
      <span class="upload-card__label">Practice Video</span>
      <button type="button" class="upload-card__choose-btn">Choose file</button>
    </div>
    <div class="upload-card">
      <span class="upload-card__label">Reference Video</span>
      <button type="button" class="upload-card__choose-btn">Choose file</button>
    </div>
  </div>

  <button type="button" class="upload-page__analyze">Analyze</button>

  <p style="margin-top: 24px; font-size: 12px; color: var(--light); opacity: 0.5;">
    Mock only — open the app for real Choose file / Analyze behavior.
  </p>
</body>
</html>
